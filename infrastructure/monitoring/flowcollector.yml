kind: FlowCollector
apiVersion: flows.netobserv.io/v1beta2
metadata:
  name: cluster
spec:
  agent:
    ebpf:
      logLevel: info
      metrics:
        server:
          port: 9400
      privileged: false
      sampling: 50
    type: eBPF
  consolePlugin:
    autoscaler:
      status: Disabled
    enable: true
    logLevel: info
    portNaming:
      enable: true
      portNames:
        '3100': loki
  kafka:
      enable: false
  loki:
    enable: false
    lokiStack:
      name: loki
    mode: Monolithic
    monolithic:
      tenantID: netobserv
      tls:
        caCert:
          certFile: service-ca.crt
          name: loki-gateway-ca-bundle
          type: configmap
        enable: false
      url: 'http://loki.netobserv.svc:3100/'
    readTimeout: 30s
    writeBatchSize: 10485760
    writeBatchWait: 1s
    writeTimeout: 10s
  namespace: netobserv
  prometheus:
    querier:
      enable: true
      mode: Auto
      timeout: 30s
